<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão dos Mandarinhos 🇧🇷</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #009C3B;
      --verde-escuro: #007A2D;
      --amarelo: #FFDF00;
      --amarelo-claro: #FFF176;
      --azul: #002776;
      --azul-claro: #1a3a8f;
      --branco: #FFFFFF;
      --cinza-bg: #f0f4f0;
      --cinza-card: #ffffff;
      --cinza-texto: #1a1a2e;
      --cinza-suave: #e8f0e8;
      --erro: #c62828;
      --acerto: #2e7d32;
      --acumulado: #e65100;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cinza-bg);
      color: var(--cinza-texto);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, var(--verde) 0%, var(--verde-escuro) 50%, var(--azul) 100%);
      padding: 2rem 1rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 30px,
        rgba(255,255,255,0.03) 30px,
        rgba(255,255,255,0.03) 60px
      );
    }
    .header-inner { position: relative; z-index: 1; }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      color: var(--amarelo);
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }
    header p {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      margin-top: 0.4rem;
      font-weight: 500;
    }
    .flag-strip {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 1rem;
    }
    .flag-strip span {
      display: inline-block;
      height: 6px;
      width: 60px;
    }
    .flag-strip span:nth-child(1) { background: var(--verde); border-radius: 3px 0 0 3px; }
    .flag-strip span:nth-child(2) { background: var(--amarelo); width: 40px; }
    .flag-strip span:nth-child(3) { background: var(--azul); border-radius: 0 3px 3px 0; }

    /* ─── LAYOUT ─── */
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    section { margin-bottom: 2.5rem; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--verde-escuro);
      letter-spacing: 0.06em;
      border-left: 5px solid var(--amarelo);
      padding-left: 0.75rem;
      margin-bottom: 1rem;
    }

    /* ─── JOGO CARD ─── */
    .jogo-card {
      background: var(--cinza-card);
      border-radius: 12px;
      border: 1px solid #d8e8d8;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,40,0,0.06);
      transition: box-shadow 0.2s;
    }
    .jogo-card:hover { box-shadow: 0 4px 16px rgba(0,40,0,0.1); }

    .jogo-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .jogo-num {
      background: var(--verde);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .jogo-titulo {
      font-weight: 700;
      font-size: 1rem;
      flex: 1;
    }
    .jogo-data {
      font-size: 0.78rem;
      color: #666;
      background: var(--cinza-suave);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }
    .pot-badge {
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-left: auto;
    }
    .pot-badge.normal { background: #e8f5e9; color: var(--verde-escuro); }
    .pot-badge.acumulado { background: #fff3e0; color: var(--acumulado); }
    .pot-badge.encerrado { background: #f3e5f5; color: #6a1b9a; }

    .form-palpite {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .form-palpite label { font-size: 0.85rem; font-weight: 600; color: #444; }

    input[type="text"], input[type="number"] {
      font-family: 'Inter', sans-serif;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: #fafafa;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--verde);
      box-shadow: 0 0 0 3px rgba(0,156,59,0.15);
      background: white;
    }
    input[type="text"].nome-input { width: 160px; }
    input[type="number"].placar-input {
      width: 56px;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .vs-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    .btn-apostar {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-apostar:hover { background: var(--verde-escuro); transform: translateY(-1px); }
    .btn-apostar:active { transform: translateY(0); }
    .btn-apostar:disabled { background: #aaa; cursor: not-allowed; transform: none; }

    .jogo-resultado-section {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px dashed #ddd;
    }
    .jogo-resultado-label { font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; }
    .resultado-inputs { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .btn-confirmar {
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-confirmar:hover { background: var(--azul-claro); }
    .btn-limpar-resultado {
      background: transparent;
      border: 1.5px solid #bbb;
      color: #666;
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-limpar-resultado:hover { border-color: #999; color: #333; }

    /* ─── PALPITES CADASTRADOS ─── */
    .palpites-section { margin-top: 3rem; }
    .palpites-filtro {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filtro-btn {
      background: white;
      border: 2px solid #ccc;
      border-radius: 20px;
      padding: 0.35rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .filtro-btn.ativo { background: var(--verde); border-color: var(--verde); color: white; }
    .filtro-btn:hover:not(.ativo) { border-color: var(--verde); color: var(--verde); }

    .palpites-jogo { margin-bottom: 2rem; }
    .palpites-jogo-titulo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--amarelo);
    }
    .palpites-jogo-nome { font-weight: 700; font-size: 1rem; }
    .palpites-total {
      font-size: 0.82rem;
      color: #555;
      background: #f5f5f5;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
    }
    .palpites-pot {
      margin-left: auto;
      font-weight: 700;
      color: var(--verde-escuro);
      font-size: 0.9rem;
    }
    .palpites-pot.acumulado { color: var(--acumulado); }

    .tabela-palpites {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .tabela-palpites th {
      background: var(--azul);
      color: white;
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .tabela-palpites th:nth-child(2) { text-align: center; }
    .tabela-palpites th:nth-child(3) { text-align: center; }
    .tabela-palpites td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #eee;
    }
    .tabela-palpites td:nth-child(2) { text-align: center; font-weight: 700; font-size: 1rem; }
    .tabela-palpites td:nth-child(3) { text-align: center; }
    .tabela-palpites tr:nth-child(even) td { background: #fafafa; }
    .tabela-palpites tr.acerto-exato td { background: #e8f5e9 !important; }
    .tabela-palpites tr.acerto-exato td:first-child::before {
      content: '🏆 ';
    }

    .badge-status {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .badge-aguardando { background: #e3f2fd; color: #1565c0; }
    .badge-acerto { background: #e8f5e9; color: #2e7d32; }
    .badge-errou { background: #ffebee; color: #c62828; }

    .empty-state {
      text-align: center;
      padding: 1.5rem;
      color: #888;
      font-size: 0.88rem;
      background: #fafafa;
      border-radius: 8px;
      border: 1px dashed #ddd;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--azul);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.sucesso { background: var(--verde-escuro); }
    #toast.erro { background: var(--erro); }
    #toast.especial { background: #f9a825; color: #000; }

    /* ─── RESUMO ─── */
    .resumo-card {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-claro) 100%);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      color: white;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .resumo-item { flex: 1; min-width: 120px; }
    .resumo-item .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--amarelo);
      line-height: 1;
    }
    .resumo-item .lbl { font-size: 0.78rem; opacity: 0.85; margin-top: 0.2rem; }

    @media (max-width: 600px) {
      .form-palpite { gap: 0.4rem; }
      input[type="text"].nome-input { width: 130px; }
      .resumo-card { gap: 1rem; }
      .tabela-palpites th, .tabela-palpites td { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🇧🇷 Bolão dos Mandarinhos</h1>
    <p>R$ 10 por palpite · quem acertar o placar exato leva tudo!</p>
    <div class="flag-strip">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<main>

  <!-- RESUMO GERAL -->
  <div class="resumo-card" id="resumo-card">
    <div class="resumo-item">
      <div class="val" id="r-palpites">0</div>
      <div class="lbl">Palpites registrados</div>
    </div>
    <div class="resumo-item">
      <div class="val" id="r-valor">R$ 0</div>
      <div class="lbl">Total arrecadado</div>
    </div>
    <div class="resumo-item">
      <div class="val" id="r-acumulado">R$ 0</div>
      <div class="lbl">Total acumulado</div>
    </div>
    <div class="resumo-item">
      <div class="val" id="r-ganhadores">0</div>
      <div class="lbl">Ganhadores totais</div>
    </div>
  </div>

  <!-- ─── SEÇÃO DE PALPITES ─── -->
  <section>
    <div class="section-title">📋 Registrar Palpite</div>
    <div id="jogos-container"></div>
  </section>

  <!-- ─── PALPITES CADASTRADOS ─── -->
  <section class="palpites-section">
    <div class="section-title">📊 Palpites Cadastrados</div>
    <div class="palpites-filtro" id="filtros"></div>
    <div id="palpites-container"></div>
  </section>

</main>

<div id="toast"></div>

<script>
  // ─── DADOS DOS JOGOS ───────────────────────────────────────────────
  const JOGOS_BASE = [
    { id: 1, adversario: 'Marrocos',   data: '13/Jun · 19h00 · Nova Jersey', grupo: 'Fase de Grupos — Grupo C' },
    { id: 2, adversario: 'Haiti',      data: '19/Jun · 21h30 · Filadélfia',  grupo: 'Fase de Grupos — Grupo C' },
    { id: 3, adversario: 'Escócia',    data: '24/Jun · 19h00 · Miami',       grupo: 'Fase de Grupos — Grupo C' },
    { id: 4, adversario: '(Oitavas)',  data: 'A definir',                     grupo: 'Eliminatória'             },
    { id: 5, adversario: '(Quartas)',  data: 'A definir',                     grupo: 'Eliminatória'             },
    { id: 6, adversario: '(Semifinal)',data: 'A definir',                     grupo: 'Eliminatória'             },
    { id: 7, adversario: '(Final)',    data: 'A definir',                     grupo: 'Final'                    },
  ];

  // ─── ESTADO ───────────────────────────────────────────────────────
  let estado = JSON.parse(localStorage.getItem('bolao_estado') || 'null') || {
    palpites: [],       // { id, jogoId, nome, golsBrasil, golsAdv, timestamp }
    resultados: {},     // { jogoId: { golsBrasil, golsAdv, encerrado } }
    acumulados: {},     // { jogoId: valor_acumulado_de_jogos_anteriores }
  };

  function salvar() {
    localStorage.setItem('bolao_estado', JSON.stringify(estado));
  }

  // ─── UTILS ───────────────────────────────────────────────────────
  function showToast(msg, tipo = 'sucesso') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = tipo;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function formatMoney(v) { return 'R$ ' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }

  function potDoJogo(jogoId) {
    const palpites = estado.palpites.filter(p => p.jogoId === jogoId);
    const acumulado = estado.acumulados[jogoId] || 0;
    return (palpites.length * 10) + acumulado;
  }

  function checkVencedor(jogoId) {
    const res = estado.resultados[jogoId];
    if (!res || !res.encerrado) return null;
    const acertaram = estado.palpites.filter(p =>
      p.jogoId === jogoId &&
      p.golsBrasil === res.golsBrasil &&
      p.golsAdv === res.golsAdv
    );
    return acertaram;
  }

  // ─── RENDER JOGOS ────────────────────────────────────────────────
  function renderJogos() {
    const container = document.getElementById('jogos-container');
    container.innerHTML = '';

    JOGOS_BASE.forEach(jogo => {
      const res = estado.resultados[jogo.id];
      const encerrado = res && res.encerrado;
      const pot = potDoJogo(jogo.id);
      const acumuladoPrevio = estado.acumulados[jogo.id] || 0;
      const isAcumulado = acumuladoPrevio > 0;

      const card = document.createElement('div');
      card.className = 'jogo-card';
      card.id = `jogo-card-${jogo.id}`;

      const vencedores = checkVencedor(jogo.id);
      let potClass = 'normal';
      if (encerrado) potClass = 'encerrado';
      else if (isAcumulado) potClass = 'acumulado';

      let potLabel = encerrado
        ? (vencedores && vencedores.length > 0 ? `🏆 Encerrado` : `🔄 Acumulou ${formatMoney(pot)}`)
        : `💰 ${formatMoney(pot)}`;

      card.innerHTML = `
        <div class="jogo-header">
          <span class="jogo-num">JOGO ${jogo.id}</span>
          <div>
            <div class="jogo-titulo">🇧🇷 Brasil × ${jogo.adversario}</div>
            <div style="font-size:0.76rem;color:#888;margin-top:1px">${jogo.grupo} · ${jogo.data}</div>
          </div>
          <span class="pot-badge ${potClass}">${potLabel}</span>
        </div>

        <div class="form-palpite" id="form-${jogo.id}">
          <label>Nome:</label>
          <input type="text" class="nome-input" id="nome-${jogo.id}" placeholder="Seu nome" ${encerrado ? 'disabled' : ''} />
          <label>Placar: 🇧🇷</label>
          <input type="number" class="placar-input" id="gb-${jogo.id}" min="0" max="20" value="0" ${encerrado ? 'disabled' : ''} />
          <span class="vs-label">×</span>
          <input type="number" class="placar-input" id="ga-${jogo.id}" min="0" max="20" value="0" ${encerrado ? 'disabled' : ''} />
          <label style="font-size:0.78rem;color:#777">${jogo.adversario}</label>
          <button class="btn-apostar" onclick="registrarPalpite(${jogo.id})" ${encerrado ? 'disabled' : ''}>
            ${encerrado ? 'Encerrado' : '+ Apostar R$ 10'}
          </button>
        </div>

        <div class="jogo-resultado-section">
          <div class="jogo-resultado-label">⚙️ Resultado oficial (admin):</div>
          <div class="resultado-inputs">
            <input type="number" class="placar-input" id="rgb-${jogo.id}" min="0" max="20" value="${res ? res.golsBrasil : 0}" />
            <span class="vs-label">×</span>
            <input type="number" class="placar-input" id="rga-${jogo.id}" min="0" max="20" value="${res ? res.golsAdv : 0}" />
            <button class="btn-confirmar" onclick="confirmarResultado(${jogo.id})">
              ${encerrado ? '✏️ Reeditar' : '✅ Confirmar Resultado'}
            </button>
            ${encerrado ? `<button class="btn-limpar-resultado" onclick="limparResultado(${jogo.id})">Limpar</button>` : ''}
          </div>
          ${encerrado && vencedores && vencedores.length > 0
            ? `<div style="margin-top:0.5rem;font-size:0.83rem;color:var(--acerto);font-weight:600">
                🏆 Vencedor(es): ${vencedores.map(v => v.nome).join(', ')} — ${formatMoney(pot / vencedores.length)} cada!
               </div>`
            : ''}
          ${encerrado && (!vencedores || vencedores.length === 0)
            ? `<div style="margin-top:0.5rem;font-size:0.83rem;color:var(--acumulado);font-weight:600">
                🔄 Ninguém acertou — ${formatMoney(pot)} acumulados para a próxima partida!
               </div>`
            : ''}
        </div>
      `;
      container.appendChild(card);
    });
  }

  // ─── REGISTRAR PALPITE ────────────────────────────────────────────
  function registrarPalpite(jogoId) {
    const nome = document.getElementById(`nome-${jogoId}`).value.trim();
    const gb   = parseInt(document.getElementById(`gb-${jogoId}`).value) || 0;
    const ga   = parseInt(document.getElementById(`ga-${jogoId}`).value) || 0;

    if (!nome) { showToast('Digite seu nome para apostar!', 'erro'); return; }
    if (nome.length > 30) { showToast('Nome muito longo!', 'erro'); return; }

    // Duplicata
    const jaExiste = estado.palpites.some(p =>
      p.jogoId === jogoId && p.nome.toLowerCase() === nome.toLowerCase()
    );
    if (jaExiste) {
      showToast(`${nome} já tem palpite neste jogo!`, 'erro');
      return;
    }

    const novo = {
      id: Date.now(),
      jogoId,
      nome,
      golsBrasil: gb,
      golsAdv: ga,
      timestamp: new Date().toLocaleString('pt-BR')
    };
    estado.palpites.push(novo);
    salvar();

    document.getElementById(`nome-${jogoId}`).value = '';
    document.getElementById(`gb-${jogoId}`).value = '0';
    document.getElementById(`ga-${jogoId}`).value = '0';

    const jogo = JOGOS_BASE.find(j => j.id === jogoId);
    showToast(`✅ Palpite de ${nome} registrado! Brasil ${gb} × ${ga} ${jogo.adversario}`, 'sucesso');
    renderAll();
  }

  // ─── CONFIRMAR RESULTADO ─────────────────────────────────────────
  function confirmarResultado(jogoId) {
    const gb = parseInt(document.getElementById(`rgb-${jogoId}`).value) || 0;
    const ga = parseInt(document.getElementById(`rga-${jogoId}`).value) || 0;

    const palpites = estado.palpites.filter(p => p.jogoId === jogoId);
    const pot = potDoJogo(jogoId);

    estado.resultados[jogoId] = { golsBrasil: gb, golsAdv: ga, encerrado: true };

    // Verificar acerto exato
    const acertaram = palpites.filter(p => p.golsBrasil === gb && p.golsAdv === ga);

    if (acertaram.length === 0 && palpites.length > 0) {
      // Ninguém acertou — encontrar próximo jogo e acumular
      const proximoJogo = JOGOS_BASE.find(j => j.id > jogoId);
      if (proximoJogo) {
        estado.acumulados[proximoJogo.id] = (estado.acumulados[proximoJogo.id] || 0) + pot;
        showToast(`🔄 Ninguém acertou! ${formatMoney(pot)} acumulados para o Jogo ${proximoJogo.id}!`, 'especial');
      } else {
        showToast(`🔄 Ninguém acertou! Não há próximo jogo cadastrado.`, 'especial');
      }
    } else if (acertaram.length > 0) {
      const premio = pot / acertaram.length;
      showToast(`🏆 ${acertaram.map(a => a.nome).join(' e ')} acertou! ${formatMoney(premio)} cada!`, 'especial');
    } else {
      showToast(`Resultado registrado: Brasil ${gb} × ${ga}`, 'sucesso');
    }

    salvar();
    renderAll();
  }

  function limparResultado(jogoId) {
    if (!confirm('Limpar o resultado deste jogo? Isso também removerá acúmulos gerados por ele.')) return;
    // Desfazer acúmulo se havia sido gerado
    const proximoJogo = JOGOS_BASE.find(j => j.id > jogoId);
    const palpites = estado.palpites.filter(p => p.jogoId === jogoId);
    const acumuladoPrevio = estado.acumulados[jogoId] || 0;
    const pot = (palpites.length * 10) + acumuladoPrevio;
    const res = estado.resultados[jogoId];
    if (res) {
      const acertaram = palpites.filter(p => p.golsBrasil === res.golsBrasil && p.golsAdv === res.golsAdv);
      if (acertaram.length === 0 && proximoJogo) {
        estado.acumulados[proximoJogo.id] = Math.max(0, (estado.acumulados[proximoJogo.id] || 0) - pot);
      }
    }
    delete estado.resultados[jogoId];
    salvar();
    renderAll();
    showToast('Resultado removido.', 'sucesso');
  }

  // ─── RENDER PALPITES ─────────────────────────────────────────────
  let filtroAtivo = 'todos';

  function renderFiltros() {
    const container = document.getElementById('filtros');
    container.innerHTML = '';

    const btn0 = document.createElement('button');
    btn0.className = 'filtro-btn' + (filtroAtivo === 'todos' ? ' ativo' : '');
    btn0.textContent = 'Todos os jogos';
    btn0.onclick = () => { filtroAtivo = 'todos'; renderAll(); };
    container.appendChild(btn0);

    JOGOS_BASE.forEach(j => {
      const total = estado.palpites.filter(p => p.jogoId === j.id).length;
      if (total === 0 && filtroAtivo !== String(j.id)) return;
      const btn = document.createElement('button');
      btn.className = 'filtro-btn' + (filtroAtivo === String(j.id) ? ' ativo' : '');
      btn.textContent = `Jogo ${j.id} (${total})`;
      btn.onclick = () => { filtroAtivo = String(j.id); renderAll(); };
      container.appendChild(btn);
    });
  }

  function renderPalpites() {
    const container = document.getElementById('palpites-container');
    container.innerHTML = '';

    const jogosFiltrados = filtroAtivo === 'todos'
      ? JOGOS_BASE
      : JOGOS_BASE.filter(j => String(j.id) === filtroAtivo);

    jogosFiltrados.forEach(jogo => {
      const palpites = estado.palpites.filter(p => p.jogoId === jogo.id);
      const res = estado.resultados[jogo.id];
      const pot = potDoJogo(jogo.id);
      const acumulado = estado.acumulados[jogo.id] || 0;

      const div = document.createElement('div');
      div.className = 'palpites-jogo';

      const vencedores = checkVencedor(jogo.id);

      div.innerHTML = `
        <div class="palpites-jogo-titulo">
          <span class="jogo-num">JOGO ${jogo.id}</span>
          <span class="palpites-jogo-nome">🇧🇷 Brasil × ${jogo.adversario}</span>
          <span class="palpites-total">${palpites.length} palpite${palpites.length !== 1 ? 's' : ''}</span>
          <span class="palpites-pot ${acumulado > 0 && !res?.encerrado ? 'acumulado' : ''}">${formatMoney(pot)}</span>
        </div>
        ${acumulado > 0 ? `<div style="font-size:0.78rem;color:var(--acumulado);margin-bottom:0.5rem;font-weight:600">🔄 Inclui R$ ${acumulado} acumulado(s) de jogo(s) anterior(es)</div>` : ''}
        ${res && res.encerrado ? `<div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;color:var(--azul)">Resultado: Brasil ${res.golsBrasil} × ${res.golsAdv} ${jogo.adversario}</div>` : ''}
      `;

      if (palpites.length === 0) {
        div.innerHTML += `<div class="empty-state">Nenhum palpite registrado para este jogo ainda.</div>`;
      } else {
        const tabela = document.createElement('table');
        tabela.className = 'tabela-palpites';
        tabela.innerHTML = `
          <thead>
            <tr>
              <th>Nome</th>
              <th>Palpite</th>
              <th>Status</th>
              <th style="font-size:0.72rem">Registrado em</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${palpites.map(p => {
              let status = '<span class="badge-status badge-aguardando">Aguardando</span>';
              let rowClass = '';
              if (res && res.encerrado) {
                const acertou = p.golsBrasil === res.golsBrasil && p.golsAdv === res.golsAdv;
                if (acertou) {
                  status = '<span class="badge-status badge-acerto">✅ Acertou!</span>';
                  rowClass = 'acerto-exato';
                } else {
                  status = '<span class="badge-status badge-errou">❌ Errou</span>';
                }
              }
              return `
                <tr class="${rowClass}" id="palpite-row-${p.id}">
                  <td>${p.nome}</td>
                  <td>${p.golsBrasil} × ${p.golsAdv}</td>
                  <td>${status}</td>
                  <td style="font-size:0.75rem;color:#888">${p.timestamp}</td>
                  <td><button onclick="removerPalpite(${p.id})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:0.8rem" title="Remover">✕</button></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        `;
        div.appendChild(tabela);
      }

      container.appendChild(div);
    });
  }

  function removerPalpite(id) {
    if (!confirm('Remover este palpite?')) return;
    const p = estado.palpites.find(x => x.id === id);
    if (!p) return;
    const res = estado.resultados[p.jogoId];
    if (res && res.encerrado) { showToast('Não é possível remover palpite de jogo encerrado.', 'erro'); return; }
    estado.palpites = estado.palpites.filter(x => x.id !== id);
    salvar();
    renderAll();
    showToast('Palpite removido.', 'sucesso');
  }

  // ─── RESUMO ────────────────────────────────────────────────────
  function renderResumo() {
    const total = estado.palpites.length;
    const valor = total * 10;
    const acumulado = Object.values(estado.acumulados || {}).reduce((a, b) => a + b, 0);
    let ganhadores = 0;
    JOGOS_BASE.forEach(j => {
      const v = checkVencedor(j.id);
      if (v) ganhadores += v.length;
    });
    document.getElementById('r-palpites').textContent = total;
    document.getElementById('r-valor').textContent = formatMoney(valor);
    document.getElementById('r-acumulado').textContent = formatMoney(acumulado);
    document.getElementById('r-ganhadores').textContent = ganhadores;
  }

  // ─── RENDER ALL ───────────────────────────────────────────────
  function renderAll() {
    renderJogos();
    renderFiltros();
    renderPalpites();
    renderResumo();
  }

  renderAll();
</script>
</body>
</html>
